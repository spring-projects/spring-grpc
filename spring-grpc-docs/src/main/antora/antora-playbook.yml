# npm + Antora CLI versions: spring-grpc-docs/package.json. Node toolchain version: pom.xml nodejs.docs.version (match engines.node).
#
# The purpose of this Antora playbook is to build the docs in the current branch.
antora:
  extensions:
  - require: '@springio/antora-extensions'
    root_component_name: 'grpc'
site:
  title: Spring gRPC Reference
  url: https://docs.spring.io/spring-grpc/reference
  robots: allow
git:
  ensure_git_suffix: false
content:
  sources:
    - url: ./../../../..
      branches: [main, '1.+({0..9}).x']
      tags: ['v1.0.3']
      start_path: spring-grpc-docs/src/main/antora
      worktrees: true
asciidoc:
  attributes:
    page-stackoverflow-url: https://stackoverflow.com/tags/grpc
    page-related-doc-projects: framework,security,spring-boot
    page-pagination: ''
    hide-uri-scheme: '@'
    tabs-sync-option: '@'
    chomp: 'all'
  extensions:
  - '@asciidoctor/tabs'
  - '@springio/asciidoctor-extensions'
  - '@springio/asciidoctor-extensions/javadoc-extension'
  sourcemap: true
urls:
  latest_version_segment_strategy: redirect:to
  latest_version_segment: ''
  redirect_facility: httpd
runtime:
  log:
    failure_level: warn
    format: pretty
ui:
  bundle:
    url: https://github.com/spring-io/antora-ui-spring/releases/download/v0.4.26/ui-bundle.zip
    snapshot: true
