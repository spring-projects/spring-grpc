name: Deploy Docs
on:
  push:
    branches: [ docs-build ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    if: ${{ github.repository == 'spring-projects/spring-grpc' }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'liberica'
        cache: maven
    - name: Run Antora
      run: |
        ./build-docs.sh
    - name: Publish Docs
      uses: spring-io/spring-doc-actions/rsync-antora-reference@v0.0.22
      with:
        docs-username: ${{ secrets.DOCS_USERNAME }}
        docs-host: ${{ secrets.DOCS_HOST }}
        docs-ssh-key: ${{ secrets.DOCS_SSH_KEY }}
        docs-ssh-host-key: ${{ secrets.DOCS_SSH_HOST_KEY }}
        site-path: spring-grpc-docs/target/antora/site
    - name: Bust Cloudflare cache
      uses: spring-io/spring-doc-actions/bust-cloudflare-antora-cache@v0.0.22
      with:
        context-root: spring-grpc
        cloudflare-zone-id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        cloudflare-cache-token: ${{ secrets.CLOUDFLARE_CACHE_TOKEN }}
